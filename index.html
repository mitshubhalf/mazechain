<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAZECHAIN | Encrypted Node</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    :root {
      --bg: #0b0b0b; --card: #111; --accent: #f5c542;
      --accent-dark: #d4a735; --accent-light: #fff3d6; --text: #aaa;
    }
    body { margin:0; font-family: 'Segoe UI', monospace; background: var(--bg); color:#fff; display: flex; justify-content: center; overflow-x: hidden; }
    .container { width: 100%; max-width: 450px; min-height: 100vh; position: relative; }
    .screen { display:none; padding:25px; box-sizing: border-box; min-height: 100vh; width: 100%; }
    .active { display:block !important; animation: fadeIn 0.4s; }
    
    /* CUBO CSS */
    .cube-wrapper { width: 60px; height: 60px; margin: 0 auto 20px; perspective: 1000px; position: relative; }
    .cube { width: 30px; height: 30px; position: absolute; top:15px; left:15px; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(45deg); }
    .face { position: absolute; width: 30px; height: 30px; border: 1px solid rgba(0,0,0,0.1); }
    .top { background: var(--accent-light); transform: rotateX(90deg) translateZ(15px); }
    .right { background: var(--accent-dark); transform: rotateY(90deg) translateZ(15px); }
    .front { background: var(--accent); transform: translateZ(15px); }
    
    h1 { text-align: center; letter-spacing: 4px; font-size: 22px; margin: 10px 0; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
    button { padding:16px; margin-top:12px; width:100%; background: var(--accent); border:none; cursor:pointer; font-weight: bold; border-radius: 8px; text-transform: uppercase; color: #000; }
    button.secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    input { width:100%; padding:14px; margin-top:10px; background:#000; border:1px solid #333; color: var(--accent); border-radius: 8px; box-sizing: border-box; }
    .seed-box { background: #000; padding: 20px; border: 1px dashed var(--accent); margin: 15px 0; border-radius: 8px; text-align: center; font-size: 13px; color: #fff; }
    .nav { display:flex; justify-content: space-between; align-items: center; padding:15px; background: #000; border-bottom: 1px solid #222; }
    .terminal { background: #000; color: #0f0; padding: 12px; font-size: 11px; height: 100px; overflow-y: auto; border: 1px solid #222; border-radius: 6px; font-family: monospace; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div class="container">
  <div id="home" class="screen active">
    <div style="margin-top: 60px; text-align: center;">
      <div class="cube-wrapper">
        <div class="cube"><div class="face top"></div><div class="face front"></div><div class="face right"></div></div>
      </div>
      <h1>MAZECHAIN</h1>
      <p style="color:var(--text)">Distributed Secure Network</p>
    </div>
    <div style="margin-top: 40px;">
      <button onclick="go('create')">CRIAR NOVA WALLET</button>
      <button class="secondary" onclick="go('import')">IMPORTAR VIA SEED</button>
      <div id="unlockArea" style="display:none; margin-top:30px; border-top:1px solid #222; padding-top:20px;">
        <input type="password" id="unlockPass" placeholder="Sua Senha de Desbloqueio">
        <button onclick="unlockWallet()">DESBLOQUEAR ACESSO</button>
      </div>
    </div>
  </div>

  <div id="create" class="screen">
    <h2>Backup Phrase</h2>
    <div id="seedBox" class="seed-box">Gerando segredos...</div>
    <input type="password" id="newPass" placeholder="Crie uma Senha">
    <button id="genBtn" onclick="generateWallet()">GERAR SEED PROTEGIDA</button>
    <button id="confirmBtn" class="secondary" onclick="go('dashboard')" style="display:none">JÁ ANOTEI (ENTRAR)</button>
  </div>

  <div id="import" class="screen">
    <h2>Recuperar Conta</h2>
    <input id="seedInput" placeholder="apple book cat dog...">
    <input type="password" id="importPass" placeholder="Senha para este dispositivo">
    <button onclick="importWallet()">VALIDAR E ENTRAR</button>
  </div>

  <div id="dashboard" class="screen" style="padding:0">
    <div class="nav">
      <b style="color:var(--accent)">MAZECHAIN CORE</b> 
      <span onclick="logout()" style="cursor:pointer; font-size:11px; color:var(--text)">[SAIR]</span>
    </div>
    <div style="padding:20px">
      <div class="card">
        <small style="color:var(--text)">ENDEREÇO PÚBLICO</small>
        <p id="addrDisp" style="font-size:10px; color:var(--accent); word-break:break-all; font-family:monospace;"></p>
        <small style="color:var(--text)">SALDO</small>
        <p id="balDisp" style="font-size:28px; font-weight:bold;">0.00 MZ</p>
      </div>
      <button id="mineBtn" onclick="runMiner()">MINERAR PRÓXIMO BLOCO</button>
      <div class="terminal" id="log">> Sessão Criptografada Ativa.</div>
    </div>
  </div>
</div>

<script>
  const API = "https://mazechain.onrender.com";
  let sessionSeed = null;

  function go(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function deriveAddress(seed) {
    const hash = CryptoJS.SHA256(seed.trim()).toString();
    return "MZ" + hash.substring(0, 20);
  }

  function encrypt(text, pass) { return CryptoJS.AES.encrypt(text, pass).toString(); }
  function decrypt(cipher, pass) {
    try {
      const bytes = CryptoJS.AES.decrypt(cipher, pass);
      return bytes.toString(CryptoJS.enc.Utf8) || null;
    } catch(e) { return null; }
  }

  async function generateWallet() {
    const pass = document.getElementById('newPass').value;
    if(pass.length < 4) return alert("Senha curta!");
    try {
      const r = await fetch(`${API}/wallet/new`);
      const t = await r.text();
      const seed = t.match(/>> (.*) <</)[1];
      const addr = deriveAddress(seed);
      document.getElementById('seedBox').innerText = seed;
      localStorage.setItem('mz_vault', encrypt(seed, pass));
      localStorage.setItem('mz_addr', addr);
      document.getElementById('genBtn').style.display = "none";
      document.getElementById('confirmBtn').style.display = "block";
    } catch(e) { alert("Erro de conexão."); }
  }

  function importWallet() {
    const seed = document.getElementById('seedInput').value.trim();
    const pass = document.getElementById('importPass').value;
    if(seed.split(/\s+/).length < 12 || pass.length < 4) return alert("Dados inválidos.");
    const addr = deriveAddress(seed);
    localStorage.setItem('mz_vault', encrypt(seed, pass));
    localStorage.setItem('mz_addr', addr);
    go('dashboard');
    updateStats();
  }

  function unlockWallet() {
    const pass = document.getElementById('unlockPass').value;
    const decrypted = decrypt(localStorage.getItem('mz_vault'), pass);
    if(decrypted) { go('dashboard'); updateStats(); } else { alert("Senha incorreta!"); }
  }

  async function updateStats() {
    const addr = localStorage.getItem('mz_addr');
    document.getElementById('addrDisp').innerText = addr;
    try {
      const r = await fetch(`${API}/balance/${addr}`);
      const d = await r.json();
      document.getElementById('balDisp').innerText = d.balance.toFixed(2) + " MZ";
    } catch(e) {}
  }

  async function runMiner() {
    const addr = localStorage.getItem('mz_addr');
    const log = document.getElementById('log');
    log.innerHTML += `<br>> Minerando...`;
    try {
      const r = await fetch(`${API}/minerar_agora/${addr}`);
      const d = await r.json();
      log.innerHTML += `<br>> Sucesso! Bloco #${d.blocos}`;
      updateStats();
    } catch(e) { log.innerHTML += `<br>> Erro na rede.`; }
  }

  function logout() { localStorage.removeItem('mz_vault'); location.reload(); }

  window.onload = () => {
    if(localStorage.getItem('mz_vault')) document.getElementById('unlockArea').style.display = "block";
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAZECHAIN | Distributed Network</title>
  <style>
    :root {
      --bg-black: #0b0b0b;
      --card-bg: #111111;
      --accent: #f5c542; /* Amarelo Ouro */
      --text-gray: #aaa;
      --terminal-green: #0f0;
      --border: #222;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', monospace;
      background: var(--bg-black);
      color: #fff;
      display: flex;
      justify-content: center;
    }

    .container { width: 100%; max-width: 500px; padding: 20px; padding-bottom: 100px; }

    header {
      display: flex;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .logo { width: 30px; height: 30px; background: var(--accent); margin-right: 15px; border-radius: 4px; }
    header h1 { font-size: 18px; letter-spacing: 2px; margin: 0; color: var(--accent); }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    .card h3 { margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }

    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .label { color: var(--text-gray); font-size: 14px; }
    .val { font-weight: bold; color: #fff; }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #000;
      border: 1px solid #333;
      color: var(--accent);
      border-radius: 5px;
      box-sizing: border-box;
    }

    .btn-main {
      display: block;
      width: 100%;
      margin-top: 15px;
      padding: 15px;
      text-align: center;
      border: 2px solid var(--accent);
      color: var(--accent);
      background: transparent;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .btn-main:hover { background: var(--accent); color: #000; }

    .terminal {
      background: #000;
      border: 1px solid #333;
      padding: 15px;
      margin-top: 10px;
      font-family: 'Courier New', monospace;
      color: var(--terminal-green);
      height: 120px;
      overflow-y: auto;
      font-size: 12px;
      border-radius: 5px;
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 500px;
      background: #000;
      display: flex;
      justify-content: space-around;
      padding: 15px 0;
      border-top: 1px solid var(--border);
    }

    .nav-item { color: var(--text-gray); font-size: 12px; cursor: pointer; text-align: center; }
    .nav-item.active { color: var(--accent); }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo"></div>
    <h1>MAZECHAIN CORE</h1>
  </header>

  <div class="card">
    <h3>🌐 Network Status</h3>
    <div class="row"><span class="label">Block Height:</span><span id="blocks" class="val">---</span></div>
    <div class="row"><span class="label">Difficulty:</span><span id="diff" class="val">---</span></div>
    <div class="row"><span class="label">Nodes Online:</span><span class="val" style="color:var(--terminal-green)">1 (Main)</span></div>
  </div>

  <div class="card">
    <h3>🔑 Wallet Access</h3>
    <div class="row"><span class="label">Address:</span><span id="addr" class="val" style="font-size: 10px;">None</span></div>
    <div class="row"><span class="label">Balance:</span><span id="balance" class="val" style="color:var(--accent)">0.00 MZ</span></div>
    
    <input type="text" id="import-addr" placeholder="Paste MZ Address to Access...">
    <button class="btn-main" onclick="accessWallet()" style="padding: 10px; font-size: 12px; border-style: dotted;">Access Wallet</button>
    <button class="btn-main" onclick="generateWallet()">Generate New Seed</button>
    
    <div id="seed-display" class="terminal" style="display:none; height: auto; color: #fff; border-color: var(--accent);"></div>
  </div>

  <div class="card">
    <h3>⛏️ Mining Interface</h3>
    <button id="mine-btn" class="btn-main" onclick="runMiner()">Start Mining Operation</button>
    <div class="terminal" id="log">
      > System Idle...<br>
      > Connect wallet to begin hashing.
    </div>
  </div>
</div>

<div class="nav-bar">
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item" onclick="location.reload()">Sync</div>
  <div class="nav-item" onclick="alert('Explorer in dev')">Explorer</div>
</div>

<script>
  const API_URL = "https://mazechain.onrender.com"; 
  let currentWallet = localStorage.getItem('mz_addr') || "";

  function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML += `<br>> ${msg}`;
    l.scrollTop = l.scrollHeight;
  }

  async function load() {
    try {
      const r = await fetch(`${API_URL}/stats`);
      const d = await r.json();
      document.getElementById('blocks').innerText = d.height;
      document.getElementById('diff').innerText = d.difficulty;

      if(currentWallet) {
        document.getElementById('addr').innerText = currentWallet;
        const rb = await fetch(`${API_URL}/balance/${currentWallet}`);
        const db = await rb.json();
        document.getElementById('balance').innerText = db.balance.toFixed(4) + " MZ";
      }
    } catch(e) { log("Connection Error to Node."); }
  }

  function accessWallet() {
    const addr = document.getElementById('import-addr').value.trim();
    if(addr.startsWith("MZ")) {
      currentWallet = addr;
      localStorage.setItem('mz_addr', addr);
      document.getElementById('addr').innerText = addr;
      log("Wallet accessed: " + addr);
      load();
    } else {
      alert("Invalid MZ Address");
    }
  }

  async function generateWallet() {
    log("Requesting new identity...");
    try {
      const r = await fetch(`${API_URL}/wallet/new`);
      const t = await r.text();
      const addr = t.match(/MZ[a-zA-Z0-9]+/)[0];
      const seed = t.match(/>> (.*) <</)[1];

      currentWallet = addr;
      localStorage.setItem('mz_addr', addr);
      document.getElementById('addr').innerText = addr;
      
      const box = document.getElementById('seed-display');
      box.innerHTML = "<strong>SAVE YOUR SEED:</strong><br>" + seed;
      box.style.display = "block";
      log("New identity generated.");
      load();
    } catch(e) { log("API Error."); }
  }

  async function runMiner() {
    if(!currentWallet) { log("ERROR: No wallet selected."); return; }
    
    const btn = document.getElementById('mine-btn');
    btn.innerText = "HASHING...";
    btn.disabled = true;
    log("Mining block using PoW...");

    try {
      const r = await fetch(`${API_URL}/minerar_agora/${currentWallet}`);
      const d = await r.json();
      log("Success! Block #" + d.blocos + " accepted.");
      load();
    } catch(e) { log("Mining timeout/failure."); }
    
    btn.innerText = "Start Mining Operation";
    btn.disabled = false;
  }

  load();
  setInterval(load, 15000);
</script>

</body>
</html>

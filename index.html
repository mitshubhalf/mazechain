<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZECHAIN | Dashboard</title>
    <style>
        :root {
            --bg: #f4f7fe;
            --navy: #1e3a8a;
            --blue-light: #3b82f6;
            --white: #ffffff;
            --border: #dbeafe;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg); 
            color: var(--navy);
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 480px; padding: 20px; padding-bottom: 100px; }

        .header { text-align: center; margin: 20px 0 30px 0; }
        .header h1 { font-size: 28px; letter-spacing: 5px; font-weight: 900; margin: 0; }

        /* Cards Estilo WhatsApp/Web3 */
        .card { 
            background: var(--white); 
            border-radius: 20px; 
            padding: 22px; 
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
        }

        .card h3 { 
            margin: 0 0 15px 0; font-size: 13px; 
            text-transform: uppercase; color: #64748b;
            letter-spacing: 1px; border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f8fafc; }
        .row:last-child { border: none; }
        .label { color: #64748b; font-size: 14px; }
        .val { font-weight: bold; color: var(--navy); }

        /* Botão Tracejado (Exatamente como na sua imagem) */
        .btn-action { 
            width: 100%; padding: 16px; border-radius: 14px; 
            border: 2px dashed var(--blue-light); 
            background-color: #f0f7ff;
            color: var(--navy);
            font-weight: 800; cursor: pointer;
            transition: 0.3s ease; margin-top: 10px;
            font-size: 14px;
        }
        .btn-action:hover { background-color: var(--blue-light); color: white; border-style: solid; }

        .seed-box {
            background-color: #f1f5f9; border-radius: 12px;
            padding: 15px; margin-top: 15px;
            text-align: center; font-family: 'Courier New', monospace;
            border: 1px solid var(--border); display: none;
            word-wrap: break-word; font-size: 13px;
        }

        /* Menu Inferior Fixo */
        .nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 480px;
            background: rgba(255, 255, 255, 0.95); 
            display: flex; justify-content: space-around; 
            padding: 18px 0; border-top: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .nav-item { text-align: center; font-size: 11px; font-weight: 700; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--blue-light); }
        .icon { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>MAZECHAIN</h1>
        </div>

        <div class="card">
            <h3>🌐 Network Status</h3>
            <div class="row">
                <span class="label">Total de Blocos:</span>
                <span id="blocks" class="val">---</span>
            </div>
            <div class="row">
                <span class="label">Dificuldade:</span>
                <span id="diff" class="val">---</span>
            </div>
        </div>

        <div class="card">
            <h3>🔑 Wallet Control</h3>
            <div class="row">
                <span class="label">Endereço MZ:</span>
                <span id="addr" class="val" style="font-size: 10px;">Não gerado</span>
            </div>
            <button class="btn-action" onclick="generateWallet()">GERAR SEED DE 12 PALAVRAS</button>
            <div id="seed-display" class="seed-box"></div>
        </div>

        <div class="card">
            <h3>⛏️ Minerador Ativo</h3>
            <button id="mine-btn" class="btn-action" style="border-color: #10b981; background-color: #f0fdf4;" onclick="runMiner()">MINERAR PRÓXIMO BLOCO</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active"><span class="icon">🏠</span>Início</div>
        <div class="nav-item" onclick="alert('Explorador em breve')"><span class="icon">🔍</span>Explorar</div>
        <div class="nav-item" onclick="location.reload()"><span class="icon">🔄</span>Sync</div>
    </div>

    <script>
        // URL DO SEU BACKEND NO RENDER
        const URL = "https://mazechain.onrender.com"; 
        let currentWallet = "MZ8bfe04334439228bae98"; // Carteira temporária

        // Carrega dados iniciais
        async function load() {
            try {
                const r = await fetch(`${URL}/stats`);
                const d = await r.json();
                document.getElementById('blocks').innerText = d.height;
                document.getElementById('diff').innerText = d.difficulty;
            } catch(e) { console.log("Erro ao conectar."); }
        }

        // Gera Carteira via API C++
        async function generateWallet() {
            try {
                const r = await fetch(`${URL}/wallet/new`);
                const t = await r.text();
                
                // Extrai dados do texto formatado do C++
                const addr = t.match(/MZ[a-zA-Z0-9]+/)[0];
                const seed = t.match(/>> (.*) <</)[1];

                document.getElementById('addr').innerText = addr;
                currentWallet = addr;
                
                const box = document.getElementById('seed-display');
                box.innerText = "Sua Seed: " + seed;
                box.style.display = "block";
            } catch(e) { alert("Erro na API."); }
        }

        // Minera via API C++
        async function runMiner() {
            const btn = document.getElementById('mine-btn');
            btn.innerText = "MINERANDO (PROVA DE TRABALHO)...";
            btn.disabled = true;

            try {
                const r = await fetch(`${URL}/minerar_agora/${currentWallet}`);
                const d = await r.json();
                alert("Bloco #" + d.blocos_agora + " aceito pela rede!");
                load();
            } catch(e) { alert("Falha na mineração."); }
            
            btn.innerText = "MINERAR PRÓXIMO BLOCO";
            btn.disabled = false;
        }

        load();
        setInterval(load, 15000); // Auto-update a cada 15s
    </script>
</body>
</html>
